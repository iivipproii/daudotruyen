services:
  - type: web
    name: api-daudo-truyen
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_STORE
        value: supabase
      - key: STORAGE_PROVIDER
        value: supabase
      - key: SUPABASE_COVER_BUCKET
        value: story-covers
      - key: FRONTEND_ORIGIN
        value: https://daudotruyen.vercel.app
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_STORAGE_BASE_URL
        sync: false
